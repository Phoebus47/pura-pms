version: 2

updates:
  # Keep GitHub Actions up to date (checkout/setup-node/upload-artifact, etc.)
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
    groups:
      github-actions:
        patterns:
          - '*'

  # Monorepo root dependencies (pnpm lockfile lives at repo root)
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - '*'

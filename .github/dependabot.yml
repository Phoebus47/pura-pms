version: 2

updates:
  # Keep GitHub Actions up to date (checkout/setup-node/upload-artifact, etc.)
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      github-actions:
        patterns:
          - '*'

  # Monorepo root dependencies (pnpm lockfile lives at repo root)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - '*'

  # Workspace packages (Dependabot needs each manifest directory explicitly)
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      web-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      api-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/packages/database'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      database-dependencies:
        patterns:
          - '*'

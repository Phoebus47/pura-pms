sonar.projectKey=pura-pms
sonar.projectName=PURA PMS
sonar.host.url=http://localhost:9000

# Authentication
# The scanner will automatically pick up the SONAR_TOKEN from the environment variable loaded by dotenv
# Do NOT hardcode the token here or use templating like {{SONAR_TOKEN}} as it is not supported natively.

# Source Code Configuration
sonar.sources=apps/web/src,apps/api/src,packages/database/src,packages/database/prisma
sonar.tests=apps/web/src,apps/api/src,packages/database/prisma

# Inclusions & Exclusions
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx
sonar.exclusions=**/*.test.ts,**/*.spec.ts,**/node_modules/**,.next/**,dist/**,coverage/**,**/*.stories.tsx,**/*.stories.ts,**/migrations/**,**/*.d.ts

# Coverage (Multiple lcov.info files from monorepo packages)
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info,apps/api/coverage/lcov.info,packages/database/coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx,**/seed*.ts,**/verify*.ts

# Duplication (Exclude seed data and configuration files from duplication check)
sonar.cpd.exclusions=**/seed*.ts,**/verify*.ts,**/migrations/**,**/*.config.ts,**/*.config.js

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.tsconfigPath=apps/web/tsconfig.json,apps/api/tsconfig.json,packages/database/tsconfig.json
